<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>포켓몬 고 웹</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">

  <!-- ===== MAP SCREEN ===== -->
  <div id="map-screen">
    <canvas id="map-canvas"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div id="hud-top">
        <div id="player-avatar">🧢</div>
        <div id="player-info">
          <div id="player-name">트레이너</div>
          <div id="player-level">Lv.1</div>
          <div id="xp-bar-wrap"><div id="xp-bar" style="width:0%"></div></div>
        </div>
        <div id="pokeball-count">⚫ 20</div>
      </div>
    </div>

    <!-- D-pad -->
    <div id="dpad">
      <div></div>
      <button class="dpad-btn"
        ontouchstart="dpadPress('up')" ontouchend="dpadRelease('up')"
        onmousedown="dpadPress('up')" onmouseup="dpadRelease('up')">▲</button>
      <div></div>
      <button class="dpad-btn"
        ontouchstart="dpadPress('left')" ontouchend="dpadRelease('left')"
        onmousedown="dpadPress('left')" onmouseup="dpadRelease('left')">◀</button>
      <div class="dpad-btn center"></div>
      <button class="dpad-btn"
        ontouchstart="dpadPress('right')" ontouchend="dpadRelease('right')"
        onmousedown="dpadPress('right')" onmouseup="dpadRelease('right')">▶</button>
      <div></div>
      <button class="dpad-btn"
        ontouchstart="dpadPress('down')" ontouchend="dpadRelease('down')"
        onmousedown="dpadPress('down')" onmouseup="dpadRelease('down')">▼</button>
      <div></div>
    </div>

    <!-- Nearby radar -->
    <div id="radar-display">
      <div id="radar-title">주변 포켓몬</div>
    </div>

    <!-- Pokestop popup -->
    <div id="pokestop-popup">
      <div id="pokestop-title">포켓스탑!</div>
      <div id="pokestop-items"></div>
    </div>

    <!-- Notification -->
    <div id="notif"></div>
  </div>

  <!-- ===== ENCOUNTER SCREEN ===== -->
  <div id="encounter-screen">
    <div id="encounter-bg">
      <!-- Grass texture strips -->
      <div style="position:absolute;bottom:42%;left:0;right:0;height:6px;background:rgba(255,255,255,0.1)"></div>

      <div id="wild-pokemon-display">
        <span id="wild-pokemon-emoji">⚡</span>
        <div id="wild-pokemon-name">피카츄</div>
        <div id="wild-pokemon-cp">CP 523</div>
        <div id="wild-pokemon-rarity">희귀</div>
      </div>

      <!-- Throw area (invisible) -->
      <div id="throw-area">
        <div id="throwing-ball"></div>
      </div>

      <!-- Catch result overlay -->
      <div id="catch-result">
        <div id="catch-result-emoji">⚡</div>
        <div id="catch-result-text">잡았다!</div>
        <div id="catch-result-sub">피카츄 포획 성공!</div>
      </div>
    </div>

    <!-- Bottom panel -->
    <div id="encounter-bottom">
      <div id="encounter-poke-info">
        <div style="flex:1">
          <div id="enc-types"></div>
        </div>
        <div style="font-size:12px;color:#888">⬅ 스와이프하여 던지기</div>
      </div>

      <div id="ball-select"></div>

      <div id="encounter-actions">
        <button id="btn-run" class="enc-btn">🏃 도망</button>
        <button id="btn-throw" class="enc-btn">⚫ 던지기</button>
      </div>
    </div>
  </div>

  <!-- ===== POKEDEX SCREEN ===== -->
  <div id="pokedex-screen" class="panel-overlay" style="display:none">
    <div class="panel-header">
      <button onclick="switchScreen('map')">←</button>
      도감 &nbsp;<span id="pokedex-count" style="font-size:13px;opacity:0.7">0 / 25</span>
    </div>
    <div class="panel-body">
      <div id="pokedex-grid" class="pokemon-grid"></div>
    </div>
  </div>

  <!-- ===== BAG SCREEN ===== -->
  <div id="bag-screen" class="panel-overlay" style="display:none">
    <div class="panel-header">
      <button onclick="switchScreen('map')">←</button>
      가방
    </div>
    <div class="panel-body" id="bag-body"></div>
  </div>

  <!-- ===== PROFILE SCREEN ===== -->
  <div id="profile-screen" class="panel-overlay" style="display:none">
    <div class="panel-header">
      <button onclick="switchScreen('map')">←</button>
      프로필
    </div>
    <div class="panel-body" id="profile-body"></div>
  </div>

  <!-- ===== BOTTOM NAV ===== -->
  <div id="bottom-nav">
    <button class="nav-btn active" data-screen="map">
      <span class="nav-icon">🗺️</span>
      <span>지도</span>
    </button>
    <button class="nav-btn" data-screen="pokedex">
      <span class="nav-icon">📖</span>
      <span>도감</span>
    </button>
    <div id="nav-catch-wrap">
      <div id="nav-catch"></div>
    </div>
    <button class="nav-btn" data-screen="bag">
      <span class="nav-icon">🎒</span>
      <span>가방</span>
    </button>
    <button class="nav-btn" data-screen="profile">
      <span class="nav-icon">👤</span>
      <span>프로필</span>
    </button>
  </div>

</div>

<script src="pokemon-data.js"></script>
<script src="game.js"></script>
</body>
</html>
